name: paper_scanner_ios
description: >-
  iOS implementation of paper_scanner, using Vision for document detection and
  CoreImage for perspective crop and filters.
version: 0.1.1
homepage: https://github.com/dattm-0301/paper_scanner
repository: https://github.com/dattm-0301/paper_scanner/tree/main/packages/paper_scanner_ios
issue_tracker: https://github.com/dattm-0301/paper_scanner/issues
topics:
  - scanner
  - document
  - camera

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  paper_scanner_platform_interface: ^0.1.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  plugin:
    implements: paper_document_scanner
    platforms:
      ios:
        pluginClass: PaperScannerIosPlugin
